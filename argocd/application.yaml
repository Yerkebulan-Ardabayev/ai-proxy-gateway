apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-proxy
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Yerkebulan-Ardabayev/ai-proxy-gateway.git
    targetRevision: main
    path: helm/ai-proxy
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-proxy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
