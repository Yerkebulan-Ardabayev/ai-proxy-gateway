apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ai-proxy-alerts
  namespace: ai-proxy
  labels:
    release: monitoring
spec:
  groups:
  - name: ai-proxy
    rules:
    - alert: HighErrorRate
      expr: sum(rate(app_requests_total{status=~"5.."}[5m])) > 0.1
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: High error rate on AI Proxy
        description: More than 0.1 req/s returning 5xx errors for 1 minute
    - alert: PodRestarts
      expr: increase(kube_pod_container_status_restarts_total{namespace="ai-proxy"}[15m]) > 2
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: Pod restarting frequently
        description: Pod {{ $labels.pod }} restarted more than 2 times in 15 minutes
