# ServiceAccount для приложения
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-proxy-sa
  namespace: ai-proxy
---
# Role - минимальные права
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-proxy-role
  namespace: ai-proxy
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
---
# RoleBinding - привязка Role к ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-proxy-rolebinding
  namespace: ai-proxy
subjects:
  - kind: ServiceAccount
    name: ai-proxy-sa
    namespace: ai-proxy
roleRef:
  kind: Role
  name: ai-proxy-role
  apiGroup: rbac.authorization.k8s.io
