apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-proxy-allow-ingress-only
  namespace: ai-proxy
spec:
  podSelector:
    matchLabels:
      app: ai-proxy
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8000
