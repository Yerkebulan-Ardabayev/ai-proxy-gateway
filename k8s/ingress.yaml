apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-proxy
  namespace: ai-proxy
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: ai-proxy.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-proxy
            port:
              number: 80
